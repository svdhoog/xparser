name: Automated AI Code Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    # Only run if the comment is on a Pull Request AND matches the exact command
    # AND only run if the comment author's username matches your specific handle
    if: >
      github.event.issue.pull_request && 
      github.event.comment.body == '/review' && 
      github.actor == 'svdhoog'
    runs-on: ubuntu-latest
    timeout-minutes: 5    # Force-kills the runner if it takes longer than 5 minutes
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Check out repository source
        uses: actions/checkout@v4

      # When running on a comment, we must explicitly fetch the PR details to get the diff
      - name: Extract Pull Request Diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the GitHub CLI tool built into the runner to fetch the raw diff
          gh pr diff ${{ github.event.issue.number }} > pr_diff.txt
          echo "DIFF_PATH=pr_diff.txt" >> $GITHUB_ENV

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai

      - name: Execute OpenRouter Review Selection
        id: openrouter_step
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          export PR_DIFF=$(cat pr_diff.txt)
          python review_pr.py > review_response.txt

      - name: Comment Review on GitHub PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewBody = fs.readFileSync('review_response.txt', 'utf8');
            
            if (reviewBody.trim()) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "### 🤖 Requested AI Code Review via OpenRouter\n\n" + reviewBody
              });
            }