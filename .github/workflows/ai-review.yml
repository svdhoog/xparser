name: Automated AI Code Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: >
      github.event.issue.pull_request && 
      github.event.comment.body == '/review' && 
      github.actor == 'svdhoog'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Check out repository source
        uses: actions/checkout@v4
        with:
          # Fetch all history so the local runner can accurately compute massive diffs
          fetch-depth: 0

      - name: Extract Pull Request Diff Locally
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Query GitHub API via CLI to discover the precise base branch ref for this PR
          BASE_REF=$(gh pr view ${{ github.event.issue.number }} --json baseRefName --jq '.baseRefName')
          
          # Ensure the target base branch is locally available to calculate the diff
          git fetch origin "$BASE_REF"
          
          # Generate the complete local diff comparing the PR head directly to the base branch
          git diff origin/"$BASE_REF"...HEAD > pr_diff.txt
          echo "DIFF_PATH=pr_diff.txt" >> $GITHUB_ENV

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai

      - name: Execute OpenRouter Review Selection
        id: openrouter_step
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          export PR_DIFF=$(cat pr_diff.txt)
          python review_pr.py > review_response.json

      - name: Create GitHub Issues from AI Review Points
        id: create_issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e '
          const fs = require("fs");
          const execSync = require("child_process").execSync;
          
          try {
            const data = JSON.parse(fs.readFileSync("review_response.json", "utf8"));
            if (!data.issues || data.issues.length === 0) {
              fs.writeFileSync("pr_comment.md", "### 🤖 AI Code Review\n\nNo structural bugs or blocking issues were identified in this diff.");
              process.exit(0);
            }
            
            let summaryMarkdown = "### 🤖 AI Code Review: Automated Issues Tracked\n\nThe following issues have been automatically tracked in the repository for this branch:\n\n| Issue Title | Tracking Link |\n| --- | --- |\n";
            
            data.issues.forEach(issue => {
              // Escape double quotes inside string parameters for shell safety
              const title = issue.title.replace(/"/g, "\\\"");
              const body = `${issue.body}\n\n*Originating from Pull Request #${{ github.event.issue.number }}*`.replace(/"/g, "\\\"");
              
              const command = `gh issue create --title "${title}" --body "${body}"`;
              const issueUrl = execSync(command).toString().trim();
              
              summaryMarkdown += `| ${issue.title} | ${issueUrl} |\n`;
            });
            
            fs.writeFileSync("pr_comment.md", summaryMarkdown);
          } catch (e) {
            console.error(e);
            fs.writeFileSync("pr_comment.md", "### ❌ AI Code Review Error\n\nThe model failed to return a cleanly formatted structural JSON object. Check execution logs for details.");
          }
          '

      - name: Comment Review Summary on GitHub PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });