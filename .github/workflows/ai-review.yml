name: Automated AI Code Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: >
      github.event.issue.pull_request && 
      github.event.comment.body == '/review' && 
      github.actor == 'svdhoog'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Fetch Pull Request Details
        id: pr_metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Retrieve target base branch and source head branch names from GitHub CLI
          BASE_REF=$(gh pr view ${{ github.event.issue.number }} --json baseRefName --jq '.baseRefName')
          HEAD_REF=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName')
          
          echo "BASE_REF=$BASE_REF" >> $GITHUB_ENV
          echo "HEAD_REF=$HEAD_REF" >> $GITHUB_ENV

      - name: Check out repository source
        uses: actions/checkout@v4
        with:
          # Fetch all history so git can trace back to the common ancestor branch point
          fetch-depth: 0
          # Force checkout to pull down the feature branch instead of main
          ref: ${{ env.HEAD_REF }}

      - name: Extract Pull Request Diff Locally
        id: diff
        run: |
          # Ensure the base branch target is locally available for comparison
          git fetch origin "${{ env.BASE_REF }}"
          
          # Triple-dot diff compares the common ancestor of base and head, matching GitHub Web UI
          git diff origin/"${{ env.BASE_REF }}"...HEAD > pr_diff.txt

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install openai

      - name: Execute OpenRouter Review Selection
        id: openrouter_step
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python review_pr.py > review_response.json

      - name: Create GitHub Issues from AI Review Points
        id: create_issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e '
          const fs = require("fs");
          const execSync = require("child_process").execSync;
          
          try {
            const rawContent = fs.readFileSync("review_response.json", "utf8").trim();
            const jsonMatch = rawContent.match(/\{[\s\S]*\}/);
            if (!jsonMatch) {
              throw new Error("No JSON object structure found in response.");
            }
            
            const data = JSON.parse(jsonMatch[0]);
            
            if (!data.issues || data.issues.length === 0) {
              fs.writeFileSync("pr_comment.md", "### 🤖 AI Code Review\n\nNo structural bugs or blocking issues were identified in this diff.");
              process.exit(0);
            }
            
            let summaryMarkdown = "### 🤖 AI Code Review: Automated Issues Tracked\n\nThe following issues have been automatically tracked in the repository for this branch:\n\n| Issue Title | Tracking Link |\n| --- | --- |\n";
            
            data.issues.forEach(issue => {
              const title = issue.title.replace(/"/g, "\\\"");
              const body = `${issue.body}\n\n*Originating from Pull Request #${{ github.event.issue.number }}*`.replace(/"/g, "\\\"");
              
              const command = `gh issue create --title "${title}" --body "${body}"`;
              const issueUrl = execSync(command).toString().trim();
              
              summaryMarkdown += `| ${issue.title} | ${issueUrl} |\n`;
            });
            
            fs.writeFileSync("pr_comment.md", summaryMarkdown);
          } catch (e) {
            console.error("Parsing or Issue creation failed:", e.message);
            const rawContent = fs.readFileSync("review_response.json", "utf8");
            const fallbackMarkdown = `### ❌ AI Code Review Format Error\n\nThe model failed to provide structural JSON data. Falling back to raw response text:\n\n${rawContent}`;
            fs.writeFileSync("pr_comment.md", fallbackMarkdown);
          }
          '

      - name: Comment Review Summary on GitHub PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const commentBody = fs.readFileSync('pr_comment.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });